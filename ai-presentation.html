<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AI原生架构展示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    background: #0b1a2f;
  }
  .slider { width: 100vw; height: 100vh; position: relative; }
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 60px 32px 40px;
    opacity: 0; transition: opacity 0.8s ease; will-change: opacity;
  }
  .slide.active { opacity: 1; z-index: 2; }
  .slide.exit { opacity: 0; z-index: 1; }
  .slide-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(0.5) saturate(1.1);
  }
  .slide-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(10,30,55,0.8) 0%, rgba(10,30,55,0.25) 100%);
  }
  .slide-content {
    position: relative; z-index: 3;
    text-align: center;
    max-width: 600px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
  }
  .brand {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    text-align: center;
    padding: 28px 20px 16px;
    background: linear-gradient(180deg, rgba(10,22,40,0.7) 0%, rgba(10,22,40,0) 100%);
    pointer-events: none;
  }
  .brand-text {
    color: #fff;
    font-size: clamp(18px, 4.5vw, 28px);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.7);
    opacity: 0.92;
  }
  .brand-text .brand-accent {
    color: #7ec8ff;
    font-weight: 700;
  }
  .slide-text {
    color: #fff;
    font-size: clamp(44px, 13vw, 80px);
    font-weight: 700;
    line-height: 1.6;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 24px rgba(0,0,0,0.7);
    word-break: break-word;
  }
  .slide-text .char { display: inline-block; opacity: 0; transform: translateY(24px); transition: opacity 0.35s ease, transform 0.35s ease; }
  .slide-text .char.show { opacity: 1; transform: translateY(0); }
  .slide-text .line1 { margin-bottom: 0.25em; }
  .slide-text .line2 { font-weight: 700; }
  .pagination {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.4s ease;
  }
  .dot.active {
    background: #7ec8ff; width: 24px; border-radius: 4px;
    box-shadow: 0 0 14px rgba(126,200,255,0.6);
  }
  .progress-bar {
    position: fixed; bottom: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #7ec8ff, #3ea8ff);
    z-index: 10; transition: width 0.1s linear; width: 0%;
  }
  .music-btn {
    position: fixed;
    top: 80px;
    right: 16px;
    z-index: 30;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(10,22,40,0.5);
    backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    pointer-events: auto;
  }
  .music-btn:hover { background: rgba(10,22,40,0.8); color: #fff; border-color: rgba(255,255,255,0.5); }
  .music-btn.muted { opacity: 0.5; }
  .music-btn.muted::after { content: ''; position: absolute; width: 18px; height: 1.5px; background: rgba(255,80,80,0.8); transform: rotate(-45deg); border-radius: 1px; }
  .sound-wave {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 18px;
  }
  .sound-wave span {
    display: inline-block;
    width: 2.5px;
    background: currentColor;
    border-radius: 1px;
    opacity: 0.7;
    animation: soundWave 0.8s ease-in-out infinite alternate;
  }
  .sound-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .sound-wave span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .sound-wave span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .music-btn.muted .sound-wave span { animation-play-state: paused; opacity: 0.3; }
  @keyframes soundWave {
    0% { transform: scaleY(0.5); }
    100% { transform: scaleY(1); }
  }
  @media (max-width: 480px) {
    .slide { padding: 50px 20px 30px; }
    .slide-text { font-size: clamp(36px, 11vw, 56px); }
    .brand { padding: 18px 16px 12px; }
    .pagination { bottom: 44px; }
    .music-btn { top: 70px; right: 12px; width: 32px; height: 32px; font-size: 14px; }
  }
  @media (orientation: landscape) and (max-height: 500px) {
    .slide-text { font-size: clamp(28px, 7vw, 44px); }
    .brand { padding: 10px 16px 8px; }
    .pagination { bottom: 20px; }
    .slide-content { min-height: 50vh; }
    .music-btn { top: 50px; }
  }
</style>
</head>
<body>

<div class="brand"><div class="brand-text"><span class="brand-accent">平云Ai</span>：灵云上智</div></div>
<div class="slider" id="slider"></div>
<div class="pagination" id="pagination"></div>
<div class="progress-bar" id="progressBar"></div>
<button class="music-btn" id="musicBtn" title="背景音乐开关">
  <span class="sound-wave" id="soundWave">
    <span></span><span></span><span></span>
  </span>
</button>

<script>
(function() {
  var slidesData = [
    { text: 'AI原生架构：自主可信的新一代技术底座', bg: 'pic/197ccec6c51ca9894657452245b5be08.webp' },
    { text: 'AI+产品本地部署：支持数据不出域，业务更安全', bg: 'pic/5b51b3ca7d943.jpg' },
    { text: '全生态信创适配：国产化适配，安全自主可控', bg: 'pic/6617d3c6710e7_800.jpg' },
    { text: 'AI安全护栏：智能检测识别、风险自动拦截', bg: 'pic/lH9aAWYhWV.jpg' },
    { text: '全程审计留痕：全链路可追溯、操作可审计', bg: 'pic/u=2057457149,1909877992&fm=253&fmt=auto&app=138&f=JPEG.webp' },
    { text: '分级权限管控：最小权限原则，精细化管控', bg: 'pic/u=953111220,3940957920&fm=253&gp=0.jpg.png' }
  ];

  var TOTAL = slidesData.length;
  var SLIDE_DURATION = 3000;
  var CHAR_INTERVAL = 35;
  var currentIndex = 0;
  var isAnimating = false;
  var slideTimer = null;
  var progressTimer = null;
  var charTimer = null;
  var progressStart = 0;

  var slider = document.getElementById('slider');
  var pagination = document.getElementById('pagination');
  var progressBar = document.getElementById('progressBar');
  var musicBtn = document.getElementById('musicBtn');

  slidesData.forEach(function(data, idx) {
    var slide = document.createElement('div');
    slide.className = 'slide' + (idx === 0 ? ' active' : '');
    slide.dataset.index = idx;

    var bg = document.createElement('div');
    bg.className = 'slide-bg';
    bg.style.backgroundImage = 'url(' + data.bg + ')';
    slide.appendChild(bg);

    var content = document.createElement('div');
    content.className = 'slide-content';
    var textEl = document.createElement('div');
    textEl.className = 'slide-text';
    textEl.dataset.raw = data.text;
    content.appendChild(textEl);
    slide.appendChild(content);
    slider.appendChild(slide);

    var dot = document.createElement('div');
    dot.className = 'dot' + (idx === 0 ? ' active' : '');
    pagination.appendChild(dot);
  });

  function clearTimers() {
    if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
    if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
    if (charTimer) { clearTimeout(charTimer); charTimer = null; }
  }

  function animateTextIn(textEl) {
    var raw = textEl.dataset.raw;
    textEl.innerHTML = '';

    var parts = raw.split('：');
    var allChars = [];

    function addLine(text, className) {
      var line = document.createElement('div');
      if (className) line.className = className;
      var chars = text.split('');
      chars.forEach(function(ch) {
        var span = document.createElement('span');
        span.className = 'char';
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        line.appendChild(span);
        allChars.push(span);
      });
      textEl.appendChild(line);
    }

    addLine(parts[0], 'line1');
    if (parts.length > 1) {
      addLine(parts[1], 'line2');
    }

    var ci = 0;
    return new Promise(function(resolve) {
      if (allChars.length === 0) { resolve(); return; }
      function showNext() {
        if (ci >= allChars.length) { resolve(); return; }
        allChars[ci].classList.add('show');
        ci++;
        charTimer = setTimeout(showNext, CHAR_INTERVAL);
      }
      showNext();
    });
  }

  function goToSlide(index) {
    if (isAnimating) return;
    if (index < 0 || index >= TOTAL) return;
    isAnimating = true;
    clearTimers();

    var slides = slider.querySelectorAll('.slide');
    var dots = pagination.querySelectorAll('.dot');

    slides[currentIndex].classList.remove('active');
    slides[currentIndex].classList.add('exit');
    slides[index].classList.remove('exit');
    slides[index].classList.add('active');

    dots.forEach(function(d) { d.classList.remove('active'); });
    dots[index].classList.add('active');

    currentIndex = index;
    var textEl = slides[index].querySelector('.slide-text');
    animateTextIn(textEl).then(function() {
      isAnimating = false;
      startSlideTimer();
    });
  }

  function startSlideTimer() {
    clearTimers();
    progressStart = Date.now();
    progressBar.style.width = '0%';

    progressTimer = setInterval(function() {
      var elapsed = Date.now() - progressStart;
      var pct = Math.min((elapsed / SLIDE_DURATION) * 100, 100);
      progressBar.style.width = pct + '%';
    }, 50);

    slideTimer = setTimeout(function() {
      advanceSlide(1);
    }, SLIDE_DURATION);
  }

  function advanceSlide(dir) {
    clearTimers();
    var next = currentIndex + dir;
    if (next >= TOTAL) { resetToStart(); return; }
    if (next < 0) { next = 0; }
    if (next === currentIndex) { startSlideTimer(); return; }
    goToSlide(next);
  }

  function resetToStart() {
    clearTimers();
    var slides = slider.querySelectorAll('.slide');
    slides.forEach(function(s, i) {
      s.classList.remove('active', 'exit');
      if (i === 0) s.classList.add('active');
    });
    var dots = pagination.querySelectorAll('.dot');
    dots.forEach(function(d) { d.classList.remove('active'); });
    dots[0].classList.add('active');
    currentIndex = 0;
    progressBar.style.width = '0%';
    isAnimating = false;
    var textEl = slides[0].querySelector('.slide-text');
    animateTextIn(textEl).then(function() { startSlideTimer(); });
  }

  // Touch swipe
  var touchStartX = 0;
  var touchStartY = 0;
  var swiping = false;

  document.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    swiping = true;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (swiping) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    if (!swiping) return;
    swiping = false;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) advanceSlide(1);
      else advanceSlide(-1);
    }
  }, { passive: true });

  document.addEventListener('click', function() { advanceSlide(1); });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault(); advanceSlide(1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault(); advanceSlide(-1);
    }
  });

  });

  // ===== Background Music via Web Audio API =====
  var audioCtx = null;
  var musicPlaying = false;
  var musicNodes = [];

  function createAmbientMusic() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Clear melodic pad - C major chord with extensions (C4, E4, G4, B4, D5)
    var notes = [261.63, 329.63, 392.00, 493.88, 587.33];

    var masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    // Gentle low-pass for warmth
    var filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 3000;
    filter.Q.value = 0.3;
    filter.connect(masterGain);

    notes.forEach(function(freq, i) {
      var osc = audioCtx.createOscillator();
      osc.type = "triangle";
      osc.frequency.value = freq;
      osc.detune.value = (Math.random() - 0.5) * 4;

      var gain = audioCtx.createGain();
      gain.gain.value = 0.12;

      // Gentle tremolo for movement
      var lfo = audioCtx.createOscillator();
      lfo.type = "sine";
      lfo.frequency.value = 0.08 + i * 0.04;
      var lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.04;
      lfo.connect(lfoGain);
      lfoGain.connect(gain.gain);
      lfo.start();

      osc.connect(gain);
      gain.connect(filter);
      osc.start();

      musicNodes.push(osc, gain, lfo, lfoGain);
    });

    // High shimmer layer for airy brightness
    var shimmerOsc = audioCtx.createOscillator();
    shimmerOsc.type = "sine";
    shimmerOsc.frequency.value = 1174.66;
    shimmerOsc.detune.value = 3;
    var shimmerGain = audioCtx.createGain();
    shimmerGain.gain.value = 0.05;
    shimmerOsc.connect(shimmerGain);
    shimmerGain.connect(filter);
    shimmerOsc.start();
    musicNodes.push(shimmerOsc, shimmerGain);

    // Sub-bass drone (adds depth on capable speakers)
    var subOsc = audioCtx.createOscillator();
    subOsc.type = "sine";
    subOsc.frequency.value = 65.41;
    var subGain = audioCtx.createGain();
    subGain.gain.value = 0.06;
    var subFilter = audioCtx.createBiquadFilter();
    subFilter.type = "lowpass";
    subFilter.frequency.value = 200;
    subOsc.connect(subGain);
    subGain.connect(subFilter);
    subFilter.connect(masterGain);
    subOsc.start();
    musicNodes.push(subOsc, subGain, subFilter);

    musicNodes._masterGain = masterGain;
    musicNodes._filter = filter;
  }

  function startMusic() {
    if (!audioCtx) {
      createAmbientMusic();
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    musicPlaying = true;
    if (musicNodes._masterGain) {
      musicNodes._masterGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.5);
    }
    musicBtn.classList.remove("muted");
  }

  function stopMusic() {
    if (musicNodes._masterGain) {
      musicNodes._masterGain.gain.setTargetAtTime(0.001, audioCtx.currentTime, 0.3);
    }
    musicPlaying = false;
    musicBtn.classList.add("muted");
  }

  function toggleMusic() {
    if (musicPlaying) {
      stopMusic();
    } else {
      startMusic();
    }
  }

  function initMusic() {
    if (audioCtx && audioCtx.state === "running") return;
    startMusic();
    document.removeEventListener("click", initMusic);
    document.removeEventListener("touchstart", initMusic);
    document.removeEventListener("keydown", initMusic);
  }

  document.addEventListener("click", initMusic, { once: true });
  document.addEventListener("touchstart", initMusic, { once: true });
  document.addEventListener("keydown", initMusic, { once: true });

  musicBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    toggleMusic();
  });
  });

  // Init
  var firstText = slider.querySelector('.slide.active .slide-text');
  animateTextIn(firstText).then(function() { startSlideTimer(); });
})();
</script>
</body>
</html>
